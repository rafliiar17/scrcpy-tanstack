name: "Release"

on:
  push:
    branches:
      - master
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest" # Although not requested, good to have if needed later
            args: ""
          - platform: "ubuntu-22.04"
            args: ""
          - platform: "windows-latest"
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          # Those targets are only used on macos runners so it's in a single job
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - name: install frontend dependencies
        run: bun install

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: "ScrcpyGUI Pro v__VERSION__"
          releaseBody: "See the assets to download this version and install."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      - name: Package Static Binary
        shell: bash
        run: |
          mkdir -p static-dist
          if [ "${{ matrix.platform }}" == "windows-latest" ]; then
            cp src-tauri/target/release/scrcpygui-pro.exe static-dist/ScrcpyGUI-Pro_Portable.exe
          elif [ "${{ matrix.platform }}" == "macos-latest" ]; then
            # ZIP the standalone .app for macOS portable use
            cp -r "src-tauri/target/release/bundle/macos/ScrcpyGUI Pro.app" static-dist/
          else
            cp src-tauri/target/release/scrcpygui-pro static-dist/ScrcpyGUI-Pro_Portable
          fi
          cd static-dist
          # Use different zip approach for different runner OS if necessary, but 'zip' is available on all GitHub Runner shells via bash
          if [ "${{ matrix.platform }}" == "windows-latest" ]; then
             powershell Compress-Archive -Path * -DestinationPath ../ScrcpyGUI-Pro-Win-Portable.zip
          else
             zip -r ../ScrcpyGUI-Pro-${{ matrix.platform }}-Portable.zip .
          fi

      - name: Upload Static Binary to Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: ScrcpyGUI-Pro-*-Portable.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
